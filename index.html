<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>번개 / 포아송 분포</title>
  <style>
    :root { --bg:#101214; --panel:#15181b; --line:#555b61; --dim:#a5abb0; --text:#ffffff; --blue:#ffffff; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.55 Arial,sans-serif; }
    button,input { font:inherit; }
    .shell { width:min(1180px,calc(100% - 32px)); margin:0 auto; padding:28px 0 44px; }
    header { display:flex; align-items:end; justify-content:space-between; gap:20px; padding-bottom:15px; border-bottom:1px solid var(--line); }
    h1,h2 { margin:0; font-weight:500; letter-spacing:.16em; }
    h1 { font-size:16px; } h2 { font-size:13px; }
    .status { color:var(--blue); font:12px var(--mono); letter-spacing:.1em; }
    .layout { display:grid; grid-template-columns:minmax(0,1fr) 280px; gap:22px; margin-top:22px; }
    .instrument { min-width:0; }
    .scope { position:relative; aspect-ratio:16/8.2; min-height:310px; border:1px solid #72787e; background:#0b0d0f; overflow:hidden; }
    .scope canvas { display:block; width:100%; height:100%; }
    .scope-label { position:absolute; left:10px; top:8px; color:#899097; font:10px var(--mono); pointer-events:none; letter-spacing:.08em; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--line); border-top:0; }
    .metric { min-width:0; padding:12px 14px; border-right:1px solid #3b4045; border-bottom:1px solid #3b4045; }
    .metric:nth-child(3n) { border-right:0; } .metric:nth-child(n+4) { border-bottom:0; }
    .metric span { display:block; color:var(--dim); font-size:11px; }
    .metric output { display:block; margin-top:3px; color:var(--text); font:18px var(--mono); white-space:nowrap; }
    .metric.accent output { color:var(--blue); }
    aside { border:1px solid var(--line); padding:18px; align-self:start; background:var(--panel); }
    .control { margin-top:19px; }
    .control label { display:flex; justify-content:space-between; gap:16px; margin-bottom:8px; color:var(--dim); font-size:12px; }
    .control output { color:var(--blue); font-family:var(--mono); }
    input[type=range] { width:100%; accent-color:var(--blue); }
    .buttons { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:24px; }
    button { min-height:38px; border:1px solid #777d82; border-radius:2px; background:#1b1f22; color:var(--text); cursor:pointer; }
    button:hover { border-color:var(--blue); } button:disabled { opacity:.38; cursor:not-allowed; }
    button.primary { color:#06131c; background:var(--blue); border-color:var(--blue); }
    #resetBtn { grid-column:1/-1; }
    .note { margin:22px 0 0; padding-top:16px; border-top:1px solid #3f4449; color:#9ca2a7; font-size:12px; }
    .distribution { margin-top:30px; padding-top:22px; border-top:1px solid var(--line); }
    .dist-head { display:flex; align-items:end; justify-content:space-between; gap:18px; }
    .dist-head p { margin:7px 0 0; color:var(--dim); }
    .dist-actions { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .dist-actions span { color:var(--dim); font:12px var(--mono); }
    .chart-wrap { margin-top:16px; height:360px; border:1px solid var(--line); background:#0b0d0f; }
    #chart { display:block; width:100%; height:100%; }
    footer { margin-top:14px; color:#7f868b; font:11px var(--mono); letter-spacing:.04em; }
    @media (max-width:920px) { .layout{grid-template-columns:1fr} aside{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}.buttons,.note{grid-column:1/-1}.scope{min-height:260px}.chart-wrap{height:320px} }
    @media (max-width:560px) { .shell{width:min(100% - 20px,1180px);padding-top:18px} header,.dist-head{align-items:flex-start;flex-direction:column}.layout{gap:14px}.scope{aspect-ratio:4/3;min-height:240px}.stats{grid-template-columns:1fr 1fr}.metric:nth-child(n){border-right:1px solid #3b4045;border-bottom:1px solid #3b4045}.metric:nth-child(2n){border-right:0}.metric:nth-last-child(-n+2){border-bottom:0} aside{grid-template-columns:1fr}.buttons,.note{grid-column:auto}.chart-wrap{height:300px}.dist-actions{width:100%;justify-content:space-between} }
  </style>
</head>
<body>
  <main class="shell">
    <header><h1>번개 / 포아송 분포</h1><div id="runStatus" class="status">READY</div></header>
    <section class="layout">
      <div class="instrument">
        <div class="scope"><canvas id="lightningCanvas" aria-label="번개 관측 영역"></canvas><span class="scope-label">관측 필드</span></div>
        <div class="stats" aria-label="실시간 통계">
          <div class="metric accent"><span>평균 발생률 λ</span><output id="lambdaStat">0.80회/초</output></div>
          <div class="metric"><span>경과 시간 t</span><output id="timeStat">0.00초</output></div>
          <div class="metric"><span>실제 발생 횟수 N(t)</span><output id="countStat">0회</output></div>
          <div class="metric"><span>기대 발생 횟수 λt</span><output id="expectedStat">0.00회</output></div>
          <div class="metric"><span>실제 발생률 N(t)/t</span><output id="rateStat">—</output></div>
          <div class="metric"><span>평균 / 이론적 발생 간격</span><output id="intervalStat">— / 1.25초</output></div>
        </div>
      </div>
      <aside>
        <h2>조작</h2>
        <div class="control"><label for="lambda"><span>평균 발생률 λ</span><output id="lambdaValue">λ = 0.8회/초</output></label><input id="lambda" type="range" min="0.1" max="5" step="0.1" value="0.8"></div>
        <div class="control"><label for="speed"><span>진행 속도</span><output id="speedValue">1배</output></label><input id="speed" type="range" min="0.25" max="10" step="0.25" value="1"></div>
        <div class="buttons"><button id="startBtn" class="primary">시작</button><button id="pauseBtn" disabled>일시정지</button><button id="resetBtn">초기화</button></div>
        <p class="note">일정한 평균 발생률<br>사건 간 독립성<br>실제 번개는 기상 조건에 따라 발생률이 달라질 수 있음</p>
      </aside>
    </section>
    <section class="distribution">
      <div class="dist-head"><div><h2>분포 확인</h2><p>μ = λ × 관측 시간 / 실험값과 이론값 비교</p></div><div class="dist-actions"><span>10초 × 500회</span><button id="runTrialsBtn">반복 실험</button></div></div>
      <div class="chart-wrap"><canvas id="chart" aria-label="실험 빈도와 이론적 포아송 분포 비교 그래프"></canvas></div>
    </section>
    <footer>일정 발생률 포아송 과정 / 발생 간격 = −ln(U) / λ</footer>
  </main>
  <script>
    'use strict';
    const $ = id => document.getElementById(id);
    const lightningCanvas=$('lightningCanvas'), lightningCtx=lightningCanvas.getContext('2d');
    const chart=$('chart'), chartCtx=chart.getContext('2d');
    const state={lambda:.8,speed:1,time:0,count:0,nextEvent:Infinity,running:false,lastFrame:0,raf:null,flashes:[],lastEventTime:0,intervalSum:0,trialData:null,noticeUntil:0};

    // 0과 1 사이의 난수로 다음 지수분포 도착 간격을 생성한다.
    function exponentialInterval(lambda){ const u=Math.max(Number.EPSILON,Math.random()); return -Math.log(u)/lambda; }
    function scheduleNext(){ state.nextEvent=state.time+exponentialInterval(state.lambda); }
    function createLightningPath(){ const points=[],segments=8+Math.floor(Math.random()*5); let x=.15+Math.random()*.7,y=0; points.push({x,y}); for(let i=1;i<=segments;i++){x=Math.max(.04,Math.min(.96,x+(Math.random()-.5)*.16));y=i/segments*(.72+Math.random()*.22);points.push({x,y});} return points; }
    function spawnLightning(){ state.intervalSum+=state.time-state.lastEventTime;state.lastEventTime=state.time;state.count++;state.flashes.push({points:createLightningPath(),age:0,duration:.18+Math.random()*.1}); }

    // CSS 크기와 devicePixelRatio를 함께 반영해 캔버스를 선명하게 유지한다.
    function fitCanvas(canvas,ctx){ const r=canvas.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2); const w=Math.max(1,Math.round(r.width*dpr)),h=Math.max(1,Math.round(r.height*dpr)); if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;} ctx.setTransform(dpr,0,0,dpr,0,0); return {w:r.width,h:r.height}; }

    // 한 사건을 한 경로로 표시하며 짧은 재점멸은 횟수에 다시 포함하지 않는다.
    function drawLightning(dt=0){ const {w,h}=fitCanvas(lightningCanvas,lightningCtx),c=lightningCtx;c.clearRect(0,0,w,h);for(const f of state.flashes)f.age+=dt;const active=state.flashes.filter(f=>f.age<f.duration);if(active.length){const flash=Math.max(...active.map(f=>1-f.age/f.duration));c.fillStyle=`rgba(240,242,243,${flash*.045})`;c.fillRect(0,0,w,h);for(const f of active){const alpha=Math.max(0,1-f.age/f.duration),flicker=Math.sin(f.age*110)>-.35?1:.32;c.strokeStyle=`rgba(240,242,243,${alpha*flicker})`;c.lineWidth=1.25;c.beginPath();f.points.forEach((p,i)=>i?c.lineTo(p.x*w,p.y*h):c.moveTo(p.x*w,p.y*h));c.stroke();}}else{c.fillStyle='#899097';c.font='11px ui-monospace,monospace';c.textAlign='center';c.fillText('다음 발생 대기 중',w/2,h-16);}state.flashes=active; }

    // 실제 프레임 간격을 시뮬레이션 시간으로 바꾸고, 지나간 모든 사건을 순서대로 처리한다.
    function frame(now){ if(!state.running)return; const realDt=Math.min((now-state.lastFrame)/1000,.12); state.lastFrame=now; const target=state.time+realDt*state.speed; while(state.nextEvent<=target){ state.time=state.nextEvent; spawnLightning(); scheduleNext(); } state.time=target; drawLightning(realDt); updateStats();updateControls();state.raf=requestAnimationFrame(frame); }
    function start(){ if(state.running)return; if(!Number.isFinite(state.nextEvent))scheduleNext(); state.running=true; state.lastFrame=performance.now(); state.raf=requestAnimationFrame(frame); updateControls(); }
    function pause(){ if(!state.running)return; state.running=false; if(state.raf)cancelAnimationFrame(state.raf); state.raf=null; updateControls(); }

    // 모든 시뮬레이션·그래프 상태를 정확히 초기값으로 되돌린다.
    function reset(){ pause(); state.time=0;state.count=0;state.nextEvent=Infinity;state.flashes=[];state.lastEventTime=0;state.intervalSum=0;state.trialData=null;drawLightning();updateStats();drawChart();updateControls(); }
    function updateStats(){ const expected=state.lambda*state.time,meanInterval=state.count?state.intervalSum/state.count:null;$('lambdaStat').textContent=state.lambda.toFixed(2)+'회/초';$('timeStat').textContent=state.time.toFixed(2)+'초';$('countStat').textContent=state.count+'회';$('expectedStat').textContent=expected.toFixed(2)+'회';$('rateStat').textContent=state.time?`${(state.count/state.time).toFixed(2)}회/초`:'—';$('intervalStat').textContent=`${meanInterval===null?'—':meanInterval.toFixed(2)+'초'} / ${(1/state.lambda).toFixed(2)}초`; }
    function updateControls(){ $('startBtn').disabled=state.running;$('pauseBtn').disabled=!state.running;$('runStatus').textContent=performance.now()<state.noticeUntil?'발생률 변경 / 기록 초기화됨':state.running?'실행 중':state.time?'일시정지':'준비'; }

    // 같은 길이의 포아송 실험을 지수분포 도착 간격으로 반복한다.
    function runTrials(){ const duration=10,trials=500,counts=[]; for(let i=0;i<trials;i++){let t=0,n=0;while(true){t+=exponentialInterval(state.lambda);if(t>duration)break;n++;}counts.push(n);} state.trialData={counts,duration,trials,lambda:state.lambda}; drawChart(); }
    function poissonPMF(k,mu){ let p=Math.exp(-mu); for(let i=1;i<=k;i++)p*=mu/i; return p; }

    // 경험적 상대빈도 막대와 이론 PMF 선을 동일 축에 직접 그린다.
    function drawChart(){ const {w,h}=fitCanvas(chart,chartCtx),c=chartCtx;c.clearRect(0,0,w,h);c.font='12px ui-monospace,monospace';c.fillStyle='#a5abb0';if(!state.trialData){c.textAlign='center';c.fillText('반복 실험 대기 중',w/2,h/2);return;}const d=state.trialData,mu=d.lambda*d.duration,mean=d.counts.reduce((a,b)=>a+b,0)/d.trials,variance=d.counts.reduce((a,b)=>a+(b-mean)**2,0)/d.trials,maxObserved=Math.max(...d.counts),maxK=Math.max(maxObserved,Math.ceil(mu+4*Math.sqrt(mu))),freq=Array(maxK+1).fill(0);d.counts.forEach(n=>{if(n<=maxK)freq[n]++;});const theory=freq.map((_,k)=>poissonPMF(k,mu)*d.trials),maxY=Math.max(...freq,...theory)*1.16,m={l:55,r:24,t:58,b:48},pw=w-m.l-m.r,ph=h-m.t-m.b,x=k=>m.l+(k+.5)*pw/(maxK+1),y=v=>m.t+ph-v/maxY*ph;c.strokeStyle='#343a3f';c.lineWidth=1;c.beginPath();for(let i=0;i<=4;i++){const yy=m.t+ph*i/4;c.moveTo(m.l,yy);c.lineTo(w-m.r,yy);}c.stroke();c.strokeStyle='#8a9095';c.beginPath();c.moveTo(m.l,m.t);c.lineTo(m.l,m.t+ph);c.lineTo(w-m.r,m.t+ph);c.stroke();const barW=Math.max(1,pw/(maxK+1)*.68);c.fillStyle='rgba(226,229,231,.52)';freq.forEach((v,k)=>c.fillRect(x(k)-barW/2,y(v),barW,m.t+ph-y(v)));c.strokeStyle='#f0f2f3';c.lineWidth=1.5;c.beginPath();theory.forEach((v,k)=>k?c.lineTo(x(k),y(v)):c.moveTo(x(k),y(v)));c.stroke();c.fillStyle='#a5abb0';c.textAlign='center';const step=Math.max(1,Math.ceil((maxK+1)/12));for(let k=0;k<=maxK;k+=step)c.fillText(k,x(k),m.t+ph+20);c.textAlign='right';for(let i=0;i<=4;i++)c.fillText(Math.round(maxY*(4-i)/4),m.l-8,m.t+ph*i/4+4);c.textAlign='center';c.fillText('발생 횟수',m.l+pw/2,h-10);c.save();c.translate(14,m.t+ph/2);c.rotate(-Math.PI/2);c.fillText('빈도',0,0);c.restore();c.textAlign='left';c.fillStyle='#e2e5e7';c.fillRect(m.l,13,13,9);c.fillStyle='#d6dade';c.fillText(`실험값   —  이론값    평균 ${mean.toFixed(2)} / μ ${mu.toFixed(2)}`,m.l+20,22);c.fillText(`분산 ${variance.toFixed(2)} / 이론 분산 ${mu.toFixed(2)}`,m.l+20,42); }

    $('startBtn').addEventListener('click',start);$('pauseBtn').addEventListener('click',pause);$('resetBtn').addEventListener('click',reset);$('runTrialsBtn').addEventListener('click',runTrials);
    $('lambda').addEventListener('input',e=>{const wasRunning=state.running;pause();state.lambda=Number(e.target.value);$('lambdaValue').textContent='λ = '+state.lambda.toFixed(1)+'회/초';reset();state.noticeUntil=performance.now()+1400;updateControls();setTimeout(updateControls,1450);if(wasRunning)start();});
    $('speed').addEventListener('input',e=>{state.speed=Number(e.target.value);$('speedValue').textContent=state.speed.toFixed(2).replace(/\.00$/, '').replace(/0$/, '')+'배';});
    new ResizeObserver(()=>{drawLightning();drawChart();}).observe(document.querySelector('.shell'));
    reset();
  </script>
</body>
</html>
